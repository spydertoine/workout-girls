<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profil | Coach Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --apple-bg: #f5f5f7;
            --apple-text: #1d1d1f;
        }

        body {
            font-family: 'SF Pro Display', -apple-system, sans-serif;
            background: radial-gradient(circle at top right, rgba(94, 92, 230, 0.1), transparent), var(--apple-bg);
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        h1 {
            font-size: 34px;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 40px;
            color: var(--apple-text);
        }

        .profile-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .profile-card {
            background: white;
            border-radius: 28px;
            padding: 30px;
            text-align: center;
            text-decoration: none;
            color: var(--apple-text);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
            font-weight: 700;
        }

        .Ines .avatar {
            background: linear-gradient(135deg, #5e5ce6, #a2a1ff);
        }

        .Zoé .avatar {
            background: linear-gradient(135deg, #ff2d55, #ff7e9d);
        }

        .name {
            font-size: 20px;
            font-weight: 700;
        }
    </style>
</head>

<body>
    <h1>Qui s'entraîne ?</h1>
    <div class="profile-grid">
        <a href="index.html?user=Ines" class="profile-card Ines">
            <div class="avatar">A</div>
            <div class="name">Ines</div>
        </a>
        <a href="index.html?user=Zoé" class="profile-card Zoé">
            <div class="avatar">C</div>
            <div class="name">Zoé</div>
        </a>
    </div>
</body>

</html>
