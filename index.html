<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coach Studio | Dashboard</title>
    <link
        href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600;700&family=Inter:wght@400;600;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --apple-bg: #f5f5f7;
            --apple-card: rgba(255, 255, 255, 0.85);
            --apple-text: #1d1d1f;
            --apple-sub: #86868b;
            --accent: #007aff;
        }

        body {
            font-family: 'SF Pro Display', 'Inter', -apple-system, sans-serif;
            background-color: var(--apple-bg);
            /* Petit dégradé de fond pour combler le vide */
            background: radial-gradient(circle at top right, #e2e2ff, transparent),
                radial-gradient(circle at bottom left, #ffe2e2, transparent),
                var(--apple-bg);
            background-attachment: fixed;
            color: var(--apple-text);
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        .main-wrapper {
            width: 100%;
            max-width: 1200px;
            /* Largeur max pour PC */
        }

        header {
            margin-bottom: 50px;
            padding-left: 10px;
        }

        .date-today {
            text-transform: uppercase;
            color: var(--apple-sub);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        h1 {
            font-weight: 700;
            font-size: clamp(32px, 5vw, 48px);
            /* Taille fluide */
            letter-spacing: -1px;
            margin: 5px 0;
        }

        #greeting {
            color: var(--accent);
            font-weight: 600;
        }

        /* GRILLE ADAPTATIVE */
        .calendar-grid {
            display: grid;
            /* 1 colonne sur mobile, 2 sur tablette, 3 sur PC */
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            padding: 10px;
        }

        .day-link {
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .card {
            background: var(--apple-card);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 28px;
            padding: 30px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.03);
            box-sizing: border-box;
        }

        /* Effet Hover pour PC */
        @media (hover: hover) {
            .card:hover {
                transform: translateY(-8px) scale(1.02);
                box-shadow: 0 25px 50px rgba(0, 0, 0, 0.08);
                background: rgba(255, 255, 255, 0.95);
            }
        }

        .card:active {
            transform: scale(0.98);
        }

        .icon-circle {
            width: 64px;
            height: 64px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            font-size: 28px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.05);
        }

        .info-box h2 {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.4px;
        }

        .info-box p {
            margin: 10px 0 20px 0;
            font-size: 16px;
            color: var(--apple-sub);
            line-height: 1.4;
        }

        .btn-start {
            background: #f2f2f7;
            color: var(--accent);
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: 600;
            text-align: center;
            font-size: 14px;
            display: inline-block;
            transition: background 0.2s;
        }

        /* Couleurs Apple Modernes */
        .lundi .icon-circle {
            background: linear-gradient(135deg, #5e5ce6, #a2a1ff);
            color: white;
        }

        .mardi .icon-circle {
            background: linear-gradient(135deg, #34c759, #81e69b);
            color: white;
        }

        .jeudi .icon-circle {
            background: linear-gradient(135deg, #ff2d55, #ff7e9d);
            color: white;
        }
    </style>
</head>

<body>

    <div class="main-wrapper">
        <header>
            <div class="date-today" id="current-date">Lundi 20 Avril</div>
            <h1><span id="greeting">Hello</span>, Prête pour ton workout ?</h1>
        </header>

        <div class="calendar-grid">
            <a href="lundi.html" class="day-link">
                <div class="card lundi">
                    <div>
                        <div class="icon-circle"></div>
                        <div class="info-box">
                            <h2>Lundi : Abdos & Cardio</h2>
                            <p>Focus sur la sangle abdominale et le gainage profond
                            </p>
                        </div>
                    </div>
                    <div class="btn-start">Voir le programme</div>
                </div>
            </a>

            <a href="mardi.html" class="day-link">
                <div class="card mardi">
                    <div>
                        <div class="icon-circle"></div>
                        <div class="info-box">
                            <h2>Mardi : Jambes & Dos</h2>
                            <p>Travail des fessiers et des jambes.</p>
                        </div>
                    </div>
                    <div class="btn-start">Voir le programme</div>
                </div>
            </a>

            <a href="jeudi.html" class="day-link">
                <div class="card jeudi">
                    <div>
                        <div class="icon-circle"></div>
                        <div class="info-box">
                            <h2>Jeudi : Full Body</h2>
                            <p>Renforcement global du corps</p>
                        </div>
                    </div>
                    <div class="btn-start">Voir le programme</div>
                </div>
            </a>
        </div>
    </div>

    <script>
        // 1. Mise à jour de la date style Apple
        const options = { weekday: 'long', day: 'numeric', month: 'long' };
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('fr-FR', options);

        // 2. Script de salutation intelligente (Java/JS)
        function updateGreeting() {
            const hour = new Date().getHours();
            const greetingElement = document.getElementById('greeting');

            if (hour < 12) {
                greetingElement.innerText = "Coucou";
            } else if (hour < 18) {
                greetingElement.innerText = "Coucou";
            } else {
                greetingElement.innerText = "Coucou";
            }
        }

        updateGreeting();
    </script>

</body>

</html>
